# fsmods configuration - generated by 'fsmods scan'.
# Curate freely: extract shared asset bundles into their own [sets.*],
# rename profiles, etc. Re-running 'scan' will not overwrite this file
# unless you pass --force.

[paths]
library = "~/FS25_ModLibrary"
mods_folder = "~/Library/Application Support/FarmingSimulator2025/mods"
savegames = "~/Library/Application Support/FarmingSimulator2025"

# Function mods: linked into EVERY profile. Add a new one here once and
# it lands in all profiles on the next 'fsmods use'.
[global]
mods = [
    "FS25_AutoDrive",
    "FS25_CabView",
    "FS25_ClickToSwitch",
    "FS25_Courseplay",
    "FS25_ExcessAnimalsSold",
    "FS25_FarmlandOverview",
    "FS25_Financing",
    "FS25_ForestryHelper",
    "FS25_FullRefund",
    "FS25_GarageMenu",
    "FS25_HiredHelperTool",
    "FS25_IconTooltips",
    "FS25_InfoDisplayExtension",
    "FS25_LumberJack",
    "FS25_MoreMissions",
    "FS25_NoRestrictedFences",
    "FS25_PerfectEdge",
    "FS25_RefreshContracts",
    "FS25_Sales_Plus",
    "FS25_SleepAtWill",
    "FS25_TSStockCheck",
    "FS25_UniversalAutoload",
    "FS25_UnloadBalesEarly",
    "FS25_UnrestrictedPlacement",
    "FS25_additionalFieldInfo",
    "FS25_additionalGameSettings",
    "FS25_allowMissionWorkOnFinishedMissions",
    "FS25_paintAndTerraformAnywhere",
    "FS25_realAutosave",
    "FS25_toggleSuperStrength",
]

# Map repo dev mods (or any path outside the library) to a name so they
# can be linked straight from the repo instead of the library.
[external]
FS25_HoldToSteer = "~/Dropbox/htdocs/FS25_Mods/mods/FS25_HoldToSteer"
FS25_NaviHelper = "~/Dropbox/htdocs/FS25_Mods/mods/FS25_NaviHelper"
FS25_CruiseControlPlus = "~/Dropbox/htdocs/FS25_Mods/mods/FS25_CruiseControlPlus"

